<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward | Star Future</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="component.js"></script>

    <style>
        :root { --gold: #FFD700; --dark-bg: #050505; }
        body { background: var(--dark-bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .premium-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; position: relative; }
        .inner-content { padding: 24px; z-index: 2; position: relative; }
        .chart-container { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; }
        
        /* Timeline Styles */
        .timeline-line { position: absolute; top: 20px; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.1); z-index: 0; }
        .node-pulse { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* Mobile Scrollbar */
        ::-webkit-scrollbar { height: 4px; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <main class="max-w-7xl mx-auto space-y-8 pt-20 pb-20 relative z-10">
        
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black orbitron italic uppercase tracking-tighter">
                    Network <span class="text-yellow-500">Analytics</span>
                </h1>
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em]">30:30:40 Rule Qualification</p>
            </div>
            <button onclick="syncData()" class="bg-white/5 border border-white/10 p-3 rounded-xl hover:bg-white/10 transition-all group">
                <i data-lucide="refresh-cw" class="w-5 h-5 text-yellow-500 group-hover:rotate-180 transition-transform duration-500"></i>
            </button>
        </div>

        <div class="chart-container overflow-x-auto">
            <div class="flex justify-between items-center mb-10">
                <p class="orbitron text-[10px] text-yellow-500 uppercase tracking-widest font-bold">Leadership Reward Roadmap</p>
                <div id="rank-badge" class="px-4 py-1 bg-yellow-500/10 border border-yellow-500/20 rounded-full text-[9px] orbitron text-yellow-500 font-black">SYNCING...</div>
            </div>
            <div class="relative px-4 pb-4">
                <div class="timeline-line"></div>
                <div class="flex justify-between min-w-[1000px] relative z-10" id="reward-timeline">
                    </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 premium-card">
                <div class="inner-content">
                    <div class="flex justify-between items-center mb-6">
                        <p class="orbitron text-xs font-bold text-white uppercase">Direct Distribution</p>
                        <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest">Ranked by Volume</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px] orbitron">
                            <thead>
                                <tr class="text-gray-500 border-b border-white/5">
                                    <th class="pb-4">Partner Address</th>
                                    <th class="pb-4 text-center">Team</th>
                                    <th class="pb-4 text-right">Status</th>
                                </tr>
                            </thead>
                            <tbody id="leg-table-body" class="divide-y divide-white/5">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="premium-card">
                <div class="inner-content">
                    <p class="orbitron text-xs font-bold text-cyan-500 mb-8 uppercase tracking-widest">Next Level Progress</p>
                    <div id="qualification-bars" class="space-y-8">
                        </div>
                    
                    <div class="mt-10 pt-6 border-t border-white/10">
                        <button id="claim-btn" disabled onclick="handleClaim()" 
                                class="w-full py-4 rounded-xl orbitron text-[10px] font-black uppercase tracking-widest transition-all disabled:opacity-20 bg-yellow-500 text-black">
                            Checking Eligibility...
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script>
    const rewardTeam = [30, 50, 200, 500, 1500, 3000, 5000, 10000, 20000, 30000];
    const rewardAmt = [10, 30, 100, 200, 500, 1000, 2000, 5000, 10000, 15000];

    async function syncData() {
        const address = localStorage.getItem('userAddress') || window.userAddress;
        const activeContract = window.contract;

        if(!activeContract || !address) {
            console.log("Waiting for contract...");
            setTimeout(syncData, 1500);
            return;
        }

        try {
            // Ethers.js BigNumber handling using .toString()
            const totalTeamRaw = await activeContract.userStats(address, 1);
            const levelRaw = await activeContract.userStats(address, 3);
            
            const teamSize = parseInt(totalTeamRaw.toString());
            const level = parseInt(levelRaw.toString());

            // Rank Badge update
            const account = await activeContract.getUserAccountStats(address);
            document.getElementById('rank-badge').innerText = `RANK: ${account[0] || 'PARTNER'}`;

            // Leg Data Fetching
            const directs = await activeContract.getLevelTeam(address, 1);
            let legData = [];
            
            for(let d of directs) {
                const dStats = await activeContract.getUserBasicStats(d);
                legData.push({ 
                    address: d, 
                    count: parseInt(dStats.team.toString()) + 1 
                });
            }
            legData.sort((a,b) => b.count - a.count);

            // Components Render
            renderTimeline(level, teamSize);
            renderLegTable(legData);
            renderQualification(legData, level);

            if(window.lucide) lucide.createIcons();

        } catch(e) {
            console.error("Sync Error:", e);
        }
    }

    function renderTimeline(level, team) {
        let html = '';
        rewardTeam.forEach((target, i) => {
            const isClaimed = i < level;
            const isEligible = !isClaimed && team >= target;
            
            html += `
                <div class="flex-1 text-center relative px-2">
                    <div class="w-10 h-10 mx-auto rounded-xl flex items-center justify-center border-2 transition-all 
                        ${isClaimed ? 'bg-green-500 border-green-400' : isEligible ? 'bg-yellow-500 border-white node-pulse' : 'bg-white/5 border-white/10 opacity-30'}">
                        <i data-lucide="${isClaimed ? 'check' : (isEligible ? 'gift' : 'lock')}" class="w-4 h-4 text-black"></i>
                    </div>
                    <div class="mt-4">
                        <p class="orbitron text-[10px] font-black ${isClaimed || isEligible ? 'text-white' : 'text-gray-600'}">$${rewardAmt[i]}</p>
                        <p class="text-[7px] text-gray-500 font-bold uppercase">${target} Team</p>
                    </div>
                </div>`;
        });
        document.getElementById('reward-timeline').innerHTML = html;
    }

    function renderLegTable(legs) {
        if(legs.length === 0) {
            document.getElementById('leg-table-body').innerHTML = '<tr><td colspan="3" class="py-10 text-center opacity-20">No Direct Partners Found</td></tr>';
            return;
        }

        document.getElementById('leg-table-body').innerHTML = legs.map((leg, i) => {
            let label = i === 0 ? 'POWER LEG' : (i === 1 ? '2ND POWER' : 'SUB LEG');
            let color = i === 0 ? 'text-yellow-500' : (i === 1 ? 'text-orange-400' : 'text-gray-500');
            return `
                <tr class="border-b border-white/5">
                    <td class="py-4 font-mono text-[9px] text-gray-400">${leg.address.substring(0,18)}...</td>
                    <td class="py-4 text-center font-black text-white text-sm">${leg.count}</td>
                    <td class="py-4 text-right">
                        <span class="px-2 py-1 rounded text-[8px] font-bold border border-white/10 ${color}">${label}</span>
                    </td>
                </tr>`;
        }).join('');
    }

    function renderQualification(legs, level) {
        if(level >= 10) {
            document.getElementById('qualification-bars').innerHTML = '<p class="text-green-500 orbitron text-center">LEVEL 10 COMPLETED</p>';
            return;
        }

        const target = rewardTeam[level];
        const leg1 = legs[0]?.count || 0;
        const leg2 = legs[1]?.count || 0;
        const others = legs.slice(2).reduce((a,b) => a + b.count, 0);

        const caps = [target * 0.3, target * 0.3, target * 0.4];
        const counts = [leg1, leg2, others];
        const labels = ['Power Leg (30%)', '2nd Power Leg (30%)', 'Other Legs (40%)'];
        const colors = ['bg-yellow-500', 'bg-orange-500', 'bg-cyan-500'];

        document.getElementById('qualification-bars').innerHTML = counts.map((count, i) => {
            const perc = Math.min((count / caps[i]) * 100, 100);
            return `
                <div class="space-y-2">
                    <div class="flex justify-between text-[9px] orbitron font-bold">
                        <span class="text-gray-500 uppercase">${labels[i]}</span>
                        <span class="text-white">${count} / ${Math.floor(caps[i])}</span>
                    </div>
                    <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full ${colors[i]} transition-all duration-1000" style="width:${perc}%"></div>
                    </div>
                </div>`;
        }).join('');

        const totalQualified = Math.min(leg1, caps[0]) + Math.min(leg2, caps[1]) + Math.min(others, caps[2]);
        const btn = document.getElementById('claim-btn');
        
        if(totalQualified >= target) {
            btn.disabled = false;
            btn.innerText = `CLAIM $${rewardAmt[level]} REWARD`;
            btn.className = "w-full py-4 rounded-xl orbitron text-[10px] font-black bg-green-500 text-white shadow-lg shadow-green-500/20";
        } else {
            const need = Math.ceil(target - totalQualified);
            btn.innerText = `NEED ${need} MORE FOR NEXT`;
            btn.disabled = true;
            btn.className = "w-full py-4 rounded-xl orbitron text-[10px] font-black bg-yellow-500/10 text-yellow-500 border border-yellow-500/20";
        }
    }

    async function handleClaim() {
        try {
            const tx = await window.contract.claimReward();
            alert("Transaction Submitted!");
            await tx.wait();
            syncData();
        } catch(e) { alert("Error: " + (e.reason || e.message)); }
    }

    // Auto-sync after initialization
    window.addEventListener('load', () => setTimeout(syncData, 2000));
    </script>
</body>
</html>
