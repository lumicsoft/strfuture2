<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tx History | Star Future</title>

    <link rel="stylesheet" href="style1.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .filter-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #666; padding: 12px 24px; border-radius: 16px;
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            transition: all 0.4s ease;
        }
        
        .filter-btn.active {
            background: #FFD700;
            color: black;
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.4);
        }

        .history-inner {
            position: relative;
            margin: 2px;
            background: #080810;
            border-radius: 22px;
            padding: 20px;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .premium-card {
            position: relative;
            background: linear-gradient(45deg, rgba(255,215,0,0.1), transparent);
            border-radius: 24px;
            padding: 1px;
        }
    </style>
</head>
<body class="bg-black text-white pt-28 pb-32">

    <main class="max-w-4xl mx-auto px-6 relative z-10">
        
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-black orbitron italic uppercase tracking-tighter">
                TX <span class="text-yellow-500">HISTORY</span>
            </h1>
            <p class="text-gray-600 text-[10px] font-bold uppercase tracking-[0.3em] mt-2 italic">Direct Contract Ledger Sync</p>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-12">
            <button onclick="showHistory('all')" id="btn-all" class="filter-btn active">All Trans.</button>
            <button onclick="showHistory('Income')" id="btn-income" class="filter-btn">Income</button>
            <button onclick="showHistory('Withdrawal')" id="btn-withdrawal" class="filter-btn">Withdrawals</button>
            <button onclick="showHistory('Reward')" id="btn-reward" class="filter-btn">Rewards</button>
        </div>

        <div id="history-container" class="grid gap-6">
            <div class="text-center py-20 opacity-30">
                <div class="w-10 h-10 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="orbitron text-[10px] tracking-widest uppercase">Syncing with Blockchain...</p>
            </div>
        </div>
    </main>
<div id="footer-placeholder"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="components.js"></script>
    <script src="web3-handler.js"></script>

    <script>
       // --- Updated script section with Fixes ---

async function showHistory(category) {
    const container = document.getElementById('history-container');
    const buttons = document.querySelectorAll('.filter-btn');
    
    // UI Switch
    buttons.forEach(btn => btn.classList.remove('active'));
    const btnId = category === 'all' ? 'btn-all' : 'btn-' + category.toLowerCase();
    if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');

    // Connection Check
    if (!window.contract || !window.userAddress) {
        console.log("Waiting for Web3 Connection...");
        container.innerHTML = `<div class="text-center py-20 opacity-30 italic">Connect Wallet to View History</div>`;
        return;
    }

    try {
        console.log("Fetching history for:", window.userAddress);
        
        // Use a safer way to call the contract
        const rawLogs = await window.contract.getUserHistory(window.userAddress);
        console.log("Raw Logs from Contract:", rawLogs); // Debugging line

        if(!rawLogs || rawLogs.length === 0) {
            container.innerHTML = `<div class="text-center py-20 border border-dashed border-white/10 rounded-[40px]"><p class="text-gray-600 text-[10px] font-bold orbitron uppercase tracking-widest">No Transactions Found</p></div>`;
            return;
        }

        // Convert proxy to real array if needed and filter
        const logsArray = [...rawLogs]; 
        
        const filtered = logsArray.filter(item => {
            if (category === 'all') return true;
            // Case-insensitive match for txType
            return item.txType.toString().toLowerCase() === category.toLowerCase();
        }).reverse(); 

        if(filtered.length === 0) {
            container.innerHTML = `<div class="text-center py-20"><p class="text-gray-600 text-[10px] font-bold orbitron uppercase tracking-widest">No ${category} found</p></div>`;
            return;
        }

        let html = '';
        filtered.forEach(item => {
            // Safe formatting
            const amount = ethers.utils.formatEther(item.amount);
            const ts = item.timestamp.toNumber ? item.timestamp.toNumber() : Number(item.timestamp);
            const dateObj = new Date(ts * 1000);
            
            const date = dateObj.toLocaleDateString();
            const time = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const typeLabel = item.txType.toString();
            const typeClass = typeLabel.toLowerCase();

            html += `
            <div class="premium-card mb-4 transition-all hover:scale-[1.01]"> 
                <div class="history-inner">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center border border-white/10">
                            <i data-lucide="${getIcon(typeClass)}" class="w-4 h-4 ${typeClass === 'withdrawal' ? 'text-red-500' : 'text-yellow-500'}"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-black orbitron text-white uppercase tracking-tighter">${typeLabel}</p>
                            <p class="text-[9px] font-bold text-gray-500 mt-0.5 uppercase">${item.detail}</p>
                            <p class="text-[7px] text-gray-600 mt-0.5">${date} | ${time}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-lg orbitron text-white font-black">
                            <span class="text-[10px] text-yellow-600 mr-0.5">$</span>${parseFloat(amount).toFixed(2)}
                        </div>
                        <p class="text-[7px] text-gray-700 font-bold uppercase tracking-widest">Confirmed</p>
                    </div>
                </div>
            </div>`;
        });

        container.innerHTML = html;
        if(window.lucide) lucide.createIcons();

    } catch (err) {
        console.error("History Render Error:", err);
        container.innerHTML = `<div class="text-center py-20 text-red-500 text-[10px] orbitron font-bold">BLOCKCHAIN ERROR: PLEASE REFRESH</div>`;
    }
}

        function getIcon(type) {
            if(type === 'income') return 'trending-up';
            if(type === 'withdrawal') return 'external-link';
            if(type === 'reward') return 'award';
            return 'arrow-right-circle';
        }

        // Initialize
        window.addEventListener('load', () => {
            const check = setInterval(() => {
                if(window.contract && window.userAddress) {
                    showHistory('all');
                    clearInterval(check);
                }
            }, 1000);
        });
    </script>
</body>
</html>
