<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Matrix Status | </title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style1.css">
    
    <style>
        .pool-bar-gold { background: linear-gradient(90deg, #ca8a04, #facc15); box-shadow: 0 0 10px rgba(202, 138, 4, 0.4); }
        .pool-bar-blue { background: linear-gradient(90deg, #2563eb, #60a5fa); box-shadow: 0 0 10px rgba(37, 99, 235, 0.4); }
        .pool-bar-purple { background: linear-gradient(90deg, #9333ea, #c084fc); box-shadow: 0 0 10px rgba(147, 51, 234, 0.4); }
        
        .matrix-card { transition: transform 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .matrix-card:hover { transform: translateY(-5px); border-color: rgba(234, 179, 8, 0.2); }
        
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 4s linear infinite; }
    </style>
</head>
<body class="bg-black text-white">

    <div id="header-placeholder"></div>

    <main class="max-w-7xl mx-auto space-y-8 mt-24 mb-32 px-4">
        
        <div class="premium-card">
            <div class="inner-content !block p-6 bg-gradient-to-r from-yellow-600/10 to-transparent">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h1 class="text-3xl font-black orbitron italic uppercase tracking-tighter text-yellow-500">
                            Global <span class="text-white">Live Status</span>
                        </h1>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-1">
                            Real-time Matrix Cycle Synchronization
                        </p>
                    </div>
                    <div class="flex items-center gap-3 bg-black/50 px-5 py-2 rounded-full border border-yellow-500/20">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-black orbitron text-green-500 uppercase tracking-widest">Network Live</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="premium-card matrix-card">
                <div class="inner-content !block p-6">
                    <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                        <div>
                            <h3 class="text-sm font-black orbitron text-blue-400 uppercase italic">Magic Pool</h3>
                            <p class="text-[9px] text-gray-500 font-bold uppercase">6 Stage Progression</p>
                        </div>
                        <i data-lucide="refresh-cw" class="text-blue-500 w-5 h-5 animate-spin-slow"></i>
                    </div>
                    <div id="magic-pool-status" class="space-y-6">
                        <div class="text-center py-10 text-gray-600 animate-pulse text-[10px] font-bold italic uppercase">Loading Matrix...</div>
                    </div>
                </div>
            </div>

            <div class="premium-card matrix-card">
                <div class="inner-content !block p-6">
                    <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                        <div>
                            <h3 class="text-sm font-black orbitron text-yellow-500 uppercase italic">Royalty Club</h3>
                            <p class="text-[9px] text-gray-500 font-bold uppercase">Multi-Stage Cycles</p>
                        </div>
                        <i data-lucide="crown" class="text-yellow-500 w-5 h-5"></i>
                    </div>
                    <div id="club-status" class="space-y-6 max-h-[500px] overflow-y-auto pr-2">
                        <div class="text-center py-10 text-gray-600 animate-pulse text-[10px] font-bold italic uppercase">Loading Clubs...</div>
                    </div>
                </div>
            </div>

            <div class="premium-card matrix-card">
                <div class="inner-content !block p-6">
                    <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                        <div>
                            <h3 class="text-sm font-black orbitron text-purple-500 uppercase italic">GT Tables</h3>
                            <p class="text-[9px] text-gray-500 font-bold uppercase">Dual-Stage Progress</p>
                        </div>
                        <i data-lucide="layers" class="text-purple-500 w-5 h-5"></i>
                    </div>
                    <div id="gt-status" class="space-y-6">
                        <div class="text-center py-10 text-gray-600 animate-pulse text-[10px] font-bold italic uppercase">Loading Tables...</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="components.js"></script>
    <script src="web3-handler.js"></script>

    <script>
       let lastDataHash = ""; 

    async function updateLiveUI() {
        // Contract aur User Address check
        if(!window.contract || !window.userAddress) {
            console.log("Waiting for Wallet Connection...");
            setTimeout(updateLiveUI, 2000);
            return;
        }
        
        try {
            // Humne web3-handler mein jo naya function banaya tha use call kar rahe hain
            const allLevels = await window.contract.getGlobalLevelTracker(window.userAddress);

            // Hash check taaki screen baar-baar reload na ho
            const currentHash = JSON.stringify(allLevels.map(l => l.progress.toString() + l.isCompleted));
            if (currentHash === lastDataHash) return; 
            lastDataHash = currentHash;

            // --- 1. MAGIC POOL (Index 0 to 5) ---
            const magicData = allLevels.slice(0, 6).map(lvl => ({
                label: lvl.stageName,
                filled: lvl.progress.toNumber(),
                total: lvl.requiredForUser.toNumber(),
                color: 'pool-bar-blue',
                isCompleted: lvl.isCompleted
            }));
            renderSection('magic-pool-status', magicData);

            // --- 2. ROYALTY CLUBS (Index 6 to 17) ---
            const clubData = allLevels.slice(6, 18).map(lvl => ({
                label: lvl.stageName,
                filled: lvl.progress.toNumber(),
                total: lvl.requiredForUser.toNumber(),
                color: 'pool-bar-gold',
                isCompleted: lvl.isCompleted
            }));
            renderSection('club-status', clubData);

            // --- 3. ALL GT (Index 18 to 23) ---
const gtStages = allLevels.slice(18, 24).map(lvl => ({
    label: lvl.stageName,
    filled: lvl.progress.toNumber(),
    total: lvl.requiredForUser.toNumber(),
    color: 'pool-bar-purple',
    isCompleted: lvl.isCompleted
}));
renderSection('gt-status', gtStages);

            lucide.createIcons();
        } catch (e) {
            console.error("Matrix Personal Sync Error:", e);
        }
        // Har 10 second mein auto-update
        setTimeout(updateLiveUI, 10000);
    }

    function renderSection(id, items) {
        const container = document.getElementById(id);
        if(!container) return;
        
        container.innerHTML = items.map(item => {
            const pct = (item.filled / item.total) * 100;
            const remaining = item.total - item.filled;
            const isDone = item.isCompleted;

            // Color Logic: Agar completed hai toh Green, varna stage theme color
            const barStyle = isDone ? 'bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.6)]' : item.color;

            return `
                <div class="space-y-2 mb-5 last:mb-0">
                    <div class="flex justify-between items-end px-1">
                        <span class="text-[10px] font-black orbitron ${isDone ? 'text-green-400' : 'text-gray-400'} uppercase tracking-widest">${item.label}</span>
                        <span class="text-[11px] font-bold orbitron text-white">
                            ${isDone ? item.total : item.filled}<span class="text-gray-600">/${item.total}</span>
                        </span>
                    </div>
                    <div class="h-2 bg-white/5 rounded-full overflow-hidden border border-white/10 p-[1px]">
                        <div class="h-full rounded-full transition-all duration-1000 ${barStyle}" style="width: ${isDone ? 100 : pct}%"></div>
                    </div>
                    <div class="flex justify-between items-center px-0.5">
                        <span class="text-[8px] font-bold italic ${isDone ? 'text-green-400' : 'text-yellow-600'} uppercase">
                            ${isDone ? '✓ STAGE COMPLETED' : '→ ' + remaining + ' MORE GLOBALLY NEEDED'}
                        </span>
                        <span class="text-[9px] font-black ${isDone ? 'text-green-500' : 'text-white/30'}">${isDone ? 100 : Math.round(pct)}%</span>
                    </div>
                </div>`;
        }).join('');
    }
        window.addEventListener('load', () => {
            lucide.createIcons();
            updateLiveUI();
        });
    </script>
</body>
</html>
