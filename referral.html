<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Report - StarFuture</title>

    <link rel="stylesheet" href="style1.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="p-4 md:p-10 bg-black text-white">

    <main class="max-w-7xl mx-auto space-y-6 relative z-10">

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-5">
            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="users" class="text-green-500 w-6 h-6"></i><p class="label-text">Referral</p></div>
                <h3 class="amount-text orbitron" id="direct-count">0</h3>
            </div></div>

            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="network" class="text-emerald-500 w-6 h-6"></i><p class="label-text">Total Team</p></div>
                <h3 class="amount-text orbitron" id="team-count">0</h3>
            </div></div>

            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="banknote" class="text-yellow-600 w-6 h-6"></i><p class="label-text">total earned</p></div>
                <h3 class="amount-text orbitron"><span id="total-earned">0.00</span></h3>
            </div></div>

            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="user-plus" class="text-yellow-500 w-6 h-6"></i><p class="label-text">Direct Inc</p></div>
                <h3 class="amount-text orbitron" id="income-magic">0.00</h3>
            </div></div>

            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="layers" class="text-purple-500 w-6 h-6"></i><p class="label-text">Level Inc</p></div>
                <h3 class="amount-text orbitron" id="level-earnings">0.00</h3>
            </div></div>
        </div>

        <div class="premium-card">
            <div class="inner-content !block py-8">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                    <h3 class="text-sm font-black orbitron uppercase italic text-yellow-500">Team Level Report</h3>
                    
                    <div class="flex items-center gap-3 bg-black/50 p-2 px-4 rounded-xl border border-white/10">
                        <span class="label-text text-xs">SELECT LEVEL:</span>
                        <select id="levelSelect" onchange="loadLevelData(this.value)" class="bg-transparent text-yellow-500 font-black orbitron text-xs outline-none cursor-pointer">
                            <script>for(let i=1; i<=15; i++) document.write(`<option value="${i}">Level ${i}</option>`);</script>
                        </select>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="luxury-table w-full text-left">
                        <thead>
                            <tr class="border-b border-white/10">
                                <th class="py-4 px-2 text-xs font-black orbitron text-gray-500">USER ADDRESS</th>
                                <th class="py-4 px-2 text-xs font-black orbitron text-gray-500">LEVEL</th>
                                <th class="py-4 px-2 text-xs font-black orbitron text-gray-500">PACKAGE</th>
                                <th class="py-4 px-2 text-xs font-black orbitron text-gray-500">STATUS</th>
                                <th class="py-4 px-2 text-xs font-black orbitron text-gray-500">JOIN DATE</th>
                            </tr>
                        </thead>
                        <tbody id="team-table-body" class="text-gray-400">
                            <tr><td colspan="5" class="p-10 text-center italic text-gray-600 orbitron animate-pulse">SYNCING BLOCKCHAIN...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
<div id="footer-placeholder"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="components.js"></script> 
    <script src="web3-handler.js"></script>
    
    <script>
        lucide.createIcons();

       

        // 1. Initial Data Load
        async function loadTeamData() {
            // Check if web3 handler is ready
            if (!window.contract || !window.userAddress) {
                console.log("Waiting for contract and address...");
                setTimeout(loadTeamData, 1000); // 1 second baad fir try karega
                return;
            }

            try {
                const address = window.userAddress; // web3-handler se direct lein
                
                // Fetch stats from your ABI functions
                const basic = await window.contract.getUserBasicStats(address);
                const matrix = await window.contract.getMatrixIncomeReport(address);

                // Update UI Cards
                if(document.getElementById('direct-count')) document.getElementById('direct-count').innerText = basic[1].toString();
                if(document.getElementById('team-count')) document.getElementById('team-count').innerText = basic[0].toString();
                
                if(document.getElementById('total-earned')) document.getElementById('total-earned').innerText = window.format(basic[2]);
                if(document.getElementById('direct-earnings')) document.getElementById('direct-earnings').innerText = window.format(matrix[0]);
                if(document.getElementById('level-earnings')) document.getElementById('level-earnings').innerText = window.format(matrix[1]);

                // --- YEHA FIX HAI ---
                // Jab basic stats load ho jayein, tab Level 1 load karo
                console.log("Contract Ready. Loading Level 1 Team...");
                loadLevelMembers(1);

            } catch (err) { 
                console.error("Dashboard Load Error:", err); 
            }
        }

        // 2. Fetch Members for Specific Level
        async function loadLevelMembers(level) {
            // Safety Check: Agar contract load nahi hua toh wait karein
            if (!window.contract) {
                setTimeout(() => loadLevelMembers(level), 500);
                return;
            }

            const tableBody = document.getElementById('team-table-body');
            if(!tableBody) return;

            tableBody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-yellow-500 orbitron animate-pulse">SCANNING LEVEL ${level}...</td></tr>`;
            
            try {
                const address = window.userAddress;
                // Aapke contract ka function: getLevelTeam(address, level)
                const members = await window.contract.getLevelTeam(address, level);

                if (!members || members.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-gray-600 italic uppercase tracking-widest">No members found in Level ${level}</td></tr>`;
                    return;
                }

                let html = '';
                // Aaj ki date dikhane ke liye
                const today = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

                for (let mAddr of members) {
                    const shortAddr = mAddr.substring(0, 10) + "..." + mAddr.substring(38);
                    
                    html += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-all">
                        <td class="py-4 px-2 font-mono text-blue-400 text-xs">${shortAddr}</td>
                        <td class="px-2 text-gray-400 font-bold text-xs">LEVEL ${level}</td>
                        <td class="px-2 text-white font-black text-xs">15.00 USDT</td>
                        <td class="px-2">
                            <span class="px-2 py-1 rounded bg-green-500/10 text-green-500 text-[10px] font-bold border border-green-500/20">ACTIVE</span>
                        </td>
                        <td class="px-2 text-gray-500 font-mono text-[10px] uppercase">${today}</td>
                    </tr>`;
                }
                tableBody.innerHTML = html;

            } catch (err) { 
                console.error("Level Fetch Error:", err);
                tableBody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">BLOCKCHAIN SYNC ERROR</td></tr>`;
            }
        }

        window.loadLevelData = (v) => loadLevelMembers(v);
        window.addEventListener('load', loadTeamData);
    </script>
</body>
</html>
